version: "3.8"

services:

  nginx_proxy_manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager_skindeal
    restart: unless-stopped

    ports:
      - "80:80"
      - "81:81"
      - "443:443"

    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

    networks:
      - app_net

  apache:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: apache_server_skindeal

    volumes:
      - ./:/var/www/html

    depends_on:
      - mysql

    networks:
      - app_net

  mysql:
    image: mysql:8.0
    container_name: mysql_server_skindeal

    restart: unless-stopped

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - app_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_server_skindeal

    restart: unless-stopped

    ports:
      - "${PHPMYADMIN_PORT}:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    depends_on:
      - mysql

    networks:
      - app_net

volumes:
  mysql_data:
  npm_data:
  npm_letsencrypt:

networks:
  app_net: